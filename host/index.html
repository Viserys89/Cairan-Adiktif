<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Host</title>
    <link rel="stylesheet" href="../style/host.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="dashboard">
<header class="topbar">
        <div class="logo-area" style="display: flex; align-items: center; gap: 12px;">
          <i class='bx bx-menu menu-toggle' id="mobile-menu-btn" onclick="toggleSidebar()" style="display: none; font-size: 28px; cursor: pointer;"></i>
          
          <div class="logo">
            <img src="../assets/logovermiloren.png" alt="Vermilion Logo" />
          </div>
        </div>

        <div class="profile-section">
          <div class="profile-text">
            <span class="name">Vicky</span>
            <span class="role">Host</span>
          </div>
          <div class="avatar"></div>
          <i class="bx bx-chevron-down icon-dropdown"></i>
        </div>
      </header>

      <div class="main-layout">
        <aside class="sidebar">
          <h3 class="menu-title">Menu</h3>
          <hr class="divider" />
          <nav>
            <ul class="nav-list">
              <li
                class="nav-item active"
                onclick="loadPage('beranda.html', this)"
              >
                <i class="bx bxs-home nav-icon"></i> Beranda
              </li>
              <li class="nav-item" onclick="loadPage('laporan.html', this)">
                <i class="bx bx-file-blank nav-icon"></i> Laporan
              </li>
            </ul>
          </nav>
        </aside>
        <main class="content" id="main-content"></main>
      </div>
    </div>
    <script src="../control/host.js"></script>
  </body>
</html>
