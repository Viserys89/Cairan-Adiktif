<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login Page">
    <title>Login Page</title>
    <link rel="stylesheet" href="./style/login.css">
    <!-- Basic Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <!-- Filled Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
    <!-- Brand Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <div class="logo-container">
            <img src="./assets/vermil-logo.png" alt="Vermil Logo" class="logo">
        </div>
        <form action="">
            <h2>Login</h2>
            <p class="subtitle">Silahkan login untuk akses sistem</p>
            <div class="input-box">
                <input type="text" placeholder="Email" required>
                <i class="bx bx-envelope"></i>
            </div>
            <div class="input-box">
                <input type="password" placeholder="Password" required>
                <i class="bx bx-lock"></i>
            </div>
            <div class="remember-forgot">
                <label><input type="checkbox" name="" id="">Remember Me</label>
                <a href="./contact.html">Forgot Password</a>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        <div class="register-link">
            <p>Don't have an account? <a href="./contact.html">Register here</a></p>
        </div>
    </div>
</body>
</html>
