<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Finance Dashboard" />
    <title>Finance Dashboard</title>
    <link rel="stylesheet" href="../style/finance.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="dashboard">
      <header class="topbar">
        <div
          class="logo-area"
          style="display: flex; align-items: center; gap: 12px"
        >
          <i
            class="bx bx-menu menu-toggle"
            id="mobile-menu-btn"
            onclick="toggleSidebar()"
            style="display: none; font-size: 28px; cursor: pointer"
          ></i>
          <div class="logo">
            <img src="../assets/logovermiloren.png" alt="Vermil Logo" />
          </div>
        </div>

        <div class="profile-section">
          <div class="profile-text">
            <span class="name">Finance</span>
            <span class="role">Admin</span>
          </div>
          <div class="avatar"></div>
          <i class="bx bx-chevron-down icon-dropdown"></i>
        </div>
      </header>

      <div class="main-layout">
        <aside class="sidebar">
          <h3 class="menu-title">Menu</h3>
          <hr class="divider" />
          <nav>
            <ul class="nav-list">
              <li
                class="nav-item active"
                onclick="loadPage('beranda.html', this)"
              >
                <i class="bx bxs-bar-chart-square nav-icon"></i> Dashboard
              </li>
              <li class="nav-item" onclick="loadPage('penghasilan.html', this)">
                <i class="bx bx-wallet nav-icon"></i> Penghasilan
              </li>
              <li class="nav-item">
                <i class="fa-solid fa-right-from-bracket nav-icon-fa"></i>
                <a
                  href="../login.html"
                  style="color: inherit; text-decoration: none"
                  >Keluar</a
                >
              </li>
            </ul>
          </nav>
        </aside>

        <main class="content" id="main-content"></main>
      </div>
    </div>

    <script src="../control/finance.js"></script>
  </body>
</html>
